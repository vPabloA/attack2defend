name: Attack2Defend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-builder:
    name: Python builder, backbone and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Build deterministic knowledge bundle
        run: python scripts/knowledge_builder/build_knowledge_base.py --no-snapshot

      - name: Apply mapping backbone
        run: python scripts/mapping_builder/apply_mapping_backbone.py --last-good

      - name: Validate backbone parity bundle
        run: |
          python scripts/knowledge_builder/validate_bundle.py \
            data/knowledge-bundle.json \
            --require-mapping-backbone \
            --require-semantic-routes \
            --require-framework-chain \
            --require-cpe-index \
            --require-kev-index \
            --require-bidirectional-indexes \
            --require-source-confidence \
            --require-search-index \
            --min-mapping-files 1

      - name: Run Python tests
        run: pytest -q

  public-collectors-smoke:
    name: Public collectors smoke validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Build public-source knowledge bundle without D3FEND fanout
        run: |
          python scripts/knowledge_builder/build_knowledge_base.py \
            --with-public-sources \
            --public-no-d3fend \
            --max-kev-cves 25 \
            --no-snapshot

      - name: Validate public-source knowledge bundle
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          bundle = json.loads(Path("data/knowledge-bundle.json").read_text(encoding="utf-8"))
          metadata = bundle.get("metadata", {})
          public_sources = metadata.get("public_sources", [])
          if not public_sources:
              raise SystemExit("Public smoke failed: metadata.public_sources is empty")
          print(f"Public smoke sources: {len(public_sources)}")
          PY

      - name: Enforce public-source bundle contracts
        run: |
          python scripts/knowledge_builder/validate_bundle.py \
            data/knowledge-bundle.json \
            --require-public-sources \
            --min-nodes 100 \
            --min-edges 10

  navigator-ui:
    name: Navigator UI build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/navigator-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build deterministic knowledge bundle
        run: python scripts/knowledge_builder/build_knowledge_base.py --no-snapshot
        working-directory: ${{ github.workspace }}

      - name: Apply mapping backbone
        run: python scripts/mapping_builder/apply_mapping_backbone.py --last-good
        working-directory: ${{ github.workspace }}

      - name: Validate UI runtime bundle
        run: |
          python scripts/knowledge_builder/validate_bundle.py \
            data/knowledge-bundle.json \
            --require-mapping-backbone \
            --require-semantic-routes \
            --require-framework-chain \
            --require-cpe-index \
            --require-kev-index \
            --require-bidirectional-indexes \
            --require-source-confidence \
            --require-search-index \
            --min-mapping-files 1
        working-directory: ${{ github.workspace }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install UI dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build UI
        run: npm run build
